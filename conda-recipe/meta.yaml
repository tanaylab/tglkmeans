{% set name = "tglkmeans" %}
{% set version = environ.get("PACKAGE_VERSION", "0.6.0") %}

package:
  name: r-{{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  skip: true  # [win]
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ compiler('cxx') }}
    - sysroot_linux-64 2.17  # [linux64]
    - make
  host:
    - r-base {{ r_base }}.*
    - r-cli >=3.0.0
    - r-dofuture
    - r-dplyr >=0.5.0
    - r-future
    - r-magrittr
    - r-matrix
    - r-purrr >=0.2.0
    - r-rcpp >=0.12.11
    - r-rcppparallel
    - r-tgstat >=1.0.0
    - r-tibble >=3.1.2
  run:
    - r-base {{ r_base }}.*
    - r-cli >=3.0.0
    - r-dofuture
    - r-dplyr >=0.5.0
    - r-future
    - r-magrittr
    - r-matrix
    - r-purrr >=0.2.0
    - r-rcpp >=0.12.11
    - r-rcppparallel
    - r-tgstat >=1.0.0
    - r-tibble >=3.1.2

test:
  commands:
    - $R -e "library('tglkmeans')"

about:
  home: https://github.com/tanaylab/tglkmeans
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Efficient Implementation of K-Means++ Algorithm
  description: |
    Efficient implementation of K-Means++ algorithm. For more information see
    (1) "kmeans++ the advantages of the k-means++ algorithm" by David Arthur
    and Sergei Vassilvitskii (2007), and (2) "The Effectiveness of Lloyd-Type
    Methods for the k-Means Problem" by Rafail Ostrovsky, Yuval Rabani,
    Leonard J. Schulman and Chaitanya Swamy.
  dev_url: https://github.com/tanaylab/tglkmeans
  doc_url: https://tanaylab.github.io/tglkmeans/

extra:
  recipe-maintainers:
    - aviezerl
